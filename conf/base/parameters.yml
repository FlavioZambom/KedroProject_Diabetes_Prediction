# =============================================================================
# Data Engineering Parameters
# =============================================================================
data_engineering:
  target_column: "OUTCOME"
  zero_replacement_columns:
    - "Glucose"
    - "BloodPressure"
    - "SkinThickness"
    - "Insulin"
    - "BMI"
  outlier_q1: 0.05
  outlier_q3: 0.95
  test_size: 0.30
  random_state: 17
  split_to_fit:
    - "train"
  # Columns that must always be OHE-encoded regardless of how many unique
  # values appear in the training split.  Without this, NEW_GLUCOSE would be
  # mis-classified as binary because the dataset has no Glucose > 200
  # (the "Diabetes" bin is always empty), and a LabelEncoder fitted on 2
  # classes would raise ValueError if production data ever exceeds that limit.
  multi_class_columns:
    - "NEW_BMI"
    - "NEW_GLUCOSE"

# =============================================================================
# Training Parameters
# =============================================================================
refit:
  target_column: "OUTCOME"
  train_splits:
    - "train"
    - "test"

training:
  target_column: "OUTCOME"
  random_state: 46
  selection_metric: "f1" # metric used to pick the best model (accuracy | f1 | roc_auc | ...)

  tuning:
    enabled: false
    method: "random" # random | grid
    scoring: "f1"
    n_iter: 20 # random search only
    cv: 5
    param_grids:
      random_forest:
        n_estimators: [100, 200, 300]
        max_depth: [5, 10, 15, null]
        min_samples_split: [2, 5, 10]
        min_samples_leaf: [1, 2, 4]
      logistic_regression:
        C: [0.01, 0.1, 1.0, 10.0, 100.0]
        solver: ["lbfgs", "liblinear"]
        max_iter: [500, 1000, 2000]
      catboost:
        iterations: [100, 200, 300]
        depth: [4, 6, 8]
        learning_rate: [0.01, 0.05, 0.1, 0.2]
        l2_leaf_reg: [1, 3, 5, 7]

  # Default hyperparameters used when tuning is disabled (or as starting point)
  models:
    random_forest:
      n_estimators: 200
      max_depth: 10
      min_samples_split: 5
    logistic_regression:
      max_iter: 1000
      C: 1.0
      solver: "lbfgs"
    catboost:
      iterations: 200
      depth: 6
      learning_rate: 0.1
      verbose: 0
