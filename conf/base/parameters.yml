# =============================================================================
# Data Engineering Parameters
# =============================================================================
data_engineering:
  target_column: "OUTCOME"
  zero_replacement_columns:
    - "Glucose"
    - "BloodPressure"
    - "SkinThickness"
    - "Insulin"
    - "BMI"
  outlier_q1: 0.05
  outlier_q3: 0.95
  test_size: 0.30
  random_state: 17
  split_to_fit:
    - "train"

# =============================================================================
# Training Parameters
# =============================================================================
refit:
  target_column: "OUTCOME"
  train_splits:
    - "train"
    - "test"

training:
  target_column: "OUTCOME"
  random_state: 46
  selection_metric: "f1"        # metric used to pick the best model (accuracy | f1 | roc_auc | ...)
  models:
    random_forest:
      n_estimators: 200
      max_depth: 10
      min_samples_split: 5
    logistic_regression:
      max_iter: 1000
      C: 1.0
      solver: "lbfgs"
    catboost:
      iterations: 200
      depth: 6
      learning_rate: 0.1
      verbose: 0
